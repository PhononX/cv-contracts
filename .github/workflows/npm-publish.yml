# Publishes to npm using OIDC trusted publishing (no NPM_TOKEN).
# Prerequisites: npmjs.com → package → Settings → Trusted Publisher:
#   GitHub Actions → org/user: PhononX, repo: cv-contracts, workflow: npm-publish.yml
# See: https://docs.npmjs.com/trusted-publishers/
name: Build and Deploy into NPM

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write # version bump commits + tags
  id-token: write # OIDC for npm trusted publishing

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        # Node >= 22.14 required for trusted publishing; v6 actions align with runner Node 24
        node-version: [24.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # Do not set registry-url here: it writes an auth-based ~/.npmrc that breaks OIDC publish (ENEEDAUTH).
      # Public installs use the default registry without a token.
      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Build the project
        run: npm run build

      - name: Bump version and push tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A
          git commit -m "Commit changes before version bump [skip ci]" || echo "No changes to commit"
          npm version patch -m "Bump to %s [skip ci]"
          git push --follow-tags

      # npm 11.5.1+ for OIDC; use an npmrc with registry only (no _authToken) so the CLI uses trusted publishing.
      # Shell-unset NODE_AUTH_TOKEN in case org/repo env injects it — empty token + auth npmrc prevents OIDC.
      - name: Publish to npm (OIDC)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          NPMRC_OIDC="${RUNNER_TEMP}/npm-oidc-publish.rc"
          printf '%s\n' 'registry=https://registry.npmjs.org/' > "${NPMRC_OIDC}"
          export NPM_CONFIG_USERCONFIG="${NPMRC_OIDC}"
          unset NODE_AUTH_TOKEN || true
          npx --yes npm@11.5.1 publish

      - name: Get version
        id: package
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: echo "version=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"

      - name: Create a GitHub release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.package.outputs.version }}
          name: Release v${{ steps.package.outputs.version }}
          body: |
            New release for version ${{ steps.package.outputs.version }}.
            - Built and published to npm
          draft: false
          prerelease: false
