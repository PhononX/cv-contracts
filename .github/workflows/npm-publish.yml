# Publishes to npm using OIDC trusted publishing (no NPM_TOKEN).
# Prerequisites: npmjs.com → package → Settings → Trusted Publisher:
#   GitHub Actions → org/user: PhononX, repo: cv-contracts, workflow: npm-publish.yml
# See: https://docs.npmjs.com/trusted-publishers/
name: Build and Deploy into NPM

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write # version bump commits + tags
  id-token: write # OIDC for npm trusted publishing

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: https://registry.npmjs.org

      # Trusted publishing requires npm CLI >= 11.5.1 (bundled npm on Node 22 may be older)
      - name: Ensure npm CLI for OIDC publishing
        run: npm install -g npm@^11.5.1

      - name: Install dependencies
        run: npm install

      - name: Build the project
        run: npm run build

      - name: Bump version and push tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A
          git commit -m "Commit changes before version bump [skip ci]" || echo "No changes to commit"
          npm version patch -m "Bump to %s [skip ci]"
          git push --follow-tags

      - name: Publish to npm (OIDC)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npm publish

      - name: Get version
        id: package
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: echo "version=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"

      - name: Create a GitHub release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.package.outputs.version }}
          name: Release v${{ steps.package.outputs.version }}
          body: |
            New release for version ${{ steps.package.outputs.version }}.
            - Built and published to npm
          draft: false
          prerelease: false
