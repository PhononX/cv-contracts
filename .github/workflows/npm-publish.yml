# Publishes to npm using OIDC trusted publishing (no NPM_TOKEN).
# Prerequisites: npmjs.com → package → Settings → Trusted Publisher:
#   GitHub Actions → org/user: PhononX, repo: cv-contracts, workflow: npm-publish.yml
# See: https://docs.npmjs.com/trusted-publishers/
name: Build and Deploy into NPM

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write # version bump commits + tags
  id-token: write # OIDC for npm trusted publishing

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        # Node >= 22.14 required for trusted publishing; v6 actions align with runner Node 24
        node-version: [24.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # Do not set registry-url here: it writes an auth-based ~/.npmrc that breaks OIDC publish (ENEEDAUTH).
      # Public installs use the default registry without a token.
      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Build the project
        run: npm run build

      - name: Bump version and push tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A
          git commit -m "Commit changes before version bump [skip ci]" || echo "No changes to commit"
          npm version patch -m "Bump to %s [skip ci]"
          git push --follow-tags

      # Verify OIDC is available before attempting publish.
      # If "OIDC endpoint" prints "(not set)" the id-token permission is missing.
      # If publish still gets ENEEDAUTH, the trusted publisher is not configured on npmjs.com.
      - name: Verify OIDC environment
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "Node:  $(node --version)"
          echo "npm:   $(npm --version)"
          echo "OIDC endpoint: ${ACTIONS_ID_TOKEN_REQUEST_URL:-(not set — id-token: write permission missing)}"

      # npm 11.5.1+ required for OIDC trusted publishing.
      # Write a clean npmrc (registry only, no _authToken) so npm uses OIDC instead of token auth.
      - name: Publish to npm (OIDC)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          printf 'registry=https://registry.npmjs.org/\n' > "$RUNNER_TEMP/.npmrc-oidc"
          export NPM_CONFIG_USERCONFIG="$RUNNER_TEMP/.npmrc-oidc"
          unset NODE_AUTH_TOKEN 2>/dev/null || true
          npx --yes npm@11.5.1 publish

      - name: Get version
        id: package
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: echo "version=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"

      - name: Create a GitHub release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.package.outputs.version }}
          name: Release v${{ steps.package.outputs.version }}
          body: |
            New release for version ${{ steps.package.outputs.version }}.
            - Built and published to npm
          draft: false
          prerelease: false
